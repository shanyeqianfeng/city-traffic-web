// ============ Edmonds-Karp 最大流算法 ============
function edmondsKarp(V, edges, s, t) {
  // 构建邻接表
  let adj = Array.from({ length: V }, () => []);
  let edgeList = [];
  for (let e of edges) {
    let [u, v, cap] = e;
    edgeList.push({ to: v, rev: edgeList.length + 1, cap: cap });
    edgeList.push({ to: u, rev: edgeList.length - 1, cap: 0 });
    adj[u].push(edgeList.length - 2);
    adj[v].push(edgeList.length - 1);
  }

  let N = edgeList.length;
  let flow = 0;
  let flowMatrix = Array.from({ length: V }, () => Array(V).fill(0));
  let INF = 1e9;

  while (true) {
    let prevv = Array(V).fill(-1);
    let preve = Array(V).fill(-1);
    let dist = Array(V).fill(INF);
    dist[s] = 0;
    let q = [s];

    // BFS
    while (q.length > 0) {
      let v = q.shift();
      for (let ei of adj[v]) {
        let e = edgeList[ei];
        if (e.cap > 0 && dist[e.to] > dist[v] + 1) {
          dist[e.to] = dist[v] + 1;
          prevv[e.to] = v;
          preve[e.to] = ei;
          q.push(e.to);
        }
      }
    }

    if (dist[t] === INF) break;

    // 寻找可增广量
    let d = INF;
    for (let v = t; v !== s; v = prevv[v]) {
      d = Math.min(d, edgeList[preve[v]].cap);
    }

    // 增广
    for (let v = t; v !== s; v = prevv[v]) {
      let ei = preve[v];
      edgeList[ei].cap -= d;
      edgeList[ei ^ 1].cap += d;
      let uu = prevv[v];
      flowMatrix[uu][v] = (flowMatrix[uu][v] || 0) + d;
    }

    flow += d;
  }

  // 计算可达性（最小割）
  let reachable = Array(V).fill(false);
  let rq = [s];
  reachable[s] = true;
  while (rq.length > 0) {
    let v = rq.shift();
    for (let ei of adj[v]) {
      let e = edgeList[ei];
      if (e.cap > 0 && !reachable[e.to]) {
        reachable[e.to] = true;
        rq.push(e.to);
      }
    }
  }

  return { maxFlow: flow, flowMatrix, reachable, adj, edgeList };
}

// ============ 解析输入（自动识别） ============
function parseInput(mode) {
  if (mode === 'manual') {
    let text = document.getElementById('edgeInput').value.trim();
    let lines = text.split('\n').filter(l => l.trim() && !l.trim().startsWith('#'));
    if (lines.length === 0) return null;

    // 检测第一行是否为头部: 4个数字，且后续每行≥3个数字
    let first = lines[0].trim().split(/\s+/);
    let hasHeader = first.length === 4 && lines.length > 1 && lines[1].trim().split(/\s+/).length >= 3;

    let V, E, s, t;
    let edgeLines = lines;
    if (hasHeader) {
      V = parseInt(first[0]);
      E = parseInt(first[1]);
      s = parseInt(first[2]);
      t = parseInt(first[3]);
      edgeLines = lines.slice(1);
    }

    // 解析所有边
    let edges = [];
    let maxV = 0;
    let numPeriods = 1;
    for (let line of edgeLines) {
      let parts = line.trim().split(/\s+/);
      if (parts.length >= 3) {
        let u = parseInt(parts[0]), v = parseInt(parts[1]);
        let cap = parseInt(parts[2]);
        edges.push([u, v, cap]);
        if (u > maxV) maxV = u;
        if (v > maxV) maxV = v;
        if (parts.length > 3) numPeriods = Math.max(numPeriods, parts.length - 2);
      }
    }

    if (!hasHeader) {
      V = maxV + 1;
      E = edges.length;
      s = 0;
      t = V - 1;
      // 自动填回输入框
      document.getElementById('vertices').value = V;
      document.getElementById('edges').value = E;
      document.getElementById('source').value = s;
      document.getElementById('sink').value = t;
    } else if (edges.length !== E) {
      let err = '边数不匹配: 声明 ' + E + ' 条, 实际 ' + edges.length + ' 条';
      writeLog('错误: ' + err);
      return null;
    }

    // 提取多时段容量
    let allCaps = [];
    for (let line of edgeLines) {
      let parts = line.trim().split(/\s+/);
      if (parts.length >= 3) {
        let caps = [];
        for (let i = 2; i < parts.length; i++) caps.push(parseInt(parts[i]));
        allCaps.push(caps);
      }
    }
    return { V, E, s, t, edges, numPeriods, allCaps };
  }
  return null;
}

// ============ 视图状态（缩放/平移） ============
let viewState = { ox: 0, oy: 0, sc: 1 };
let isDragging = false;
let dragStart = { x: 0, y: 0, ox: 0, oy: 0 };

function setupCanvasEvents() {
  let canvas = document.getElementById('graphCanvas');
  canvas.addEventListener('wheel', onCanvasWheel, { passive: false });
  canvas.addEventListener('mousedown', onCanvasMouseDown);
  canvas.addEventListener('mousemove', onCanvasMouseMove);
  canvas.addEventListener('mouseup', onCanvasMouseUp);
  canvas.addEventListener('mouseleave', onCanvasMouseUp);
}

function onCanvasWheel(e) {
  e.preventDefault();
  let rect = e.target.getBoundingClientRect();
  let mx = e.clientX - rect.left;
  let my = e.clientY - rect.top;
  let delta = e.deltaY > 0 ? 0.9 : 1.1;
  let newSc = Math.max(0.1, Math.min(10, viewState.sc * delta));
  // Zoom towards cursor
  viewState.ox = mx - (mx - viewState.ox) * (newSc / viewState.sc);
  viewState.oy = my - (my - viewState.oy) * (newSc / viewState.sc);
  viewState.sc = newSc;
  updateZoomLabel();
  renderGraph();
}

function onCanvasMouseDown(e) {
  if (e.button !== 0) return;
  isDragging = true;
  dragStart.x = e.clientX;
  dragStart.y = e.clientY;
  dragStart.ox = viewState.ox;
  dragStart.oy = viewState.oy;
}

function onCanvasMouseMove(e) {
  if (!isDragging) return;
  viewState.ox = dragStart.ox + (e.clientX - dragStart.x);
  viewState.oy = dragStart.oy + (e.clientY - dragStart.y);
  renderGraph();
}

function onCanvasMouseUp() {
  isDragging = false;
}

function resetView() {
  viewState.ox = 0;
  viewState.oy = 0;
  viewState.sc = 1;
  updateZoomLabel();
  renderGraph();
}

function seededRandom(seed) {
  let s = seed >>> 0;
  return function() {
    s = (Math.imul(s, 1664525) + 1013904223) >>> 0;
    return (s & 0x7fffffff) / 0x80000000;
  };
}

function forceDirectedLayout(V, edges, W, H, nodeR) {
  // Fruchterman-Reingold 力导向布局（确定性随机种子）
  let area = W * H;
  let k = Math.sqrt(area / V) * 0.9;
  let nodes = [];
  let pad = nodeR * 2 + 10;
  let rng = seededRandom(V + edges.length * 137);
  for (let i = 0; i < V; i++) {
    let angle = rng() * 2 * Math.PI;
    let r = rng() * Math.min(W, H) * 0.3;
    nodes.push({
      x: W / 2 + r * Math.cos(angle),
      y: H / 2 + r * Math.sin(angle),
      label: String(i),
      dx: 0, dy: 0
    });
  }

  // 构建邻接表
  let adj = Array.from({ length: V }, () => []);
  for (let e of edges) {
    adj[e[0]].push(e[1]);
    adj[e[1]].push(e[0]);
  }

  let iterations = 150;
  for (let iter = 0; iter < iterations; iter++) {
    let temp = 1 - iter / iterations;  // 温度衰减
    // 清零
    for (let i = 0; i < V; i++) { nodes[i].dx = 0; nodes[i].dy = 0; }
    // 斥力（所有节点对）
    for (let i = 0; i < V; i++) {
      for (let j = i + 1; j < V; j++) {
        let dx = nodes[j].x - nodes[i].x;
        let dy = nodes[j].y - nodes[i].y;
        let dist = Math.sqrt(dx*dx + dy*dy) || 1;
        let force = k * k / dist;  // 斥力 = k^2 / dist
        let fx = force * dx / dist;
        let fy = force * dy / dist;
        nodes[i].dx -= fx;
        nodes[i].dy -= fy;
        nodes[j].dx += fx;
        nodes[j].dy += fy;
      }
    }
    // 引力（沿边）
    for (let e of edges) {
      let u = e[0], v = e[1];
      let dx = nodes[v].x - nodes[u].x;
      let dy = nodes[v].y - nodes[u].y;
      let dist = Math.sqrt(dx*dx + dy*dy) || 1;
      let force = dist * dist / k;  // 引力 = dist^2 / k
      let fx = force * dx / dist;
      let fy = force * dy / dist;
      nodes[u].dx += fx;
      nodes[u].dy += fy;
      nodes[v].dx -= fx;
      nodes[v].dy -= fy;
    }
    // 应用位移 + 边界约束
    for (let i = 0; i < V; i++) {
      let n = nodes[i];
      let disp = Math.sqrt(n.dx*n.dx + n.dy*n.dy) || 1;
      let move = Math.min(disp, temp * k);
      n.x += move * n.dx / disp;
      n.y += move * n.dy / disp;
      n.x = Math.max(pad, Math.min(W - pad, n.x));
      n.y = Math.max(pad, Math.min(H - pad, n.y));
    }
  }
  return nodes;
}

function updateZoomLabel() {
  let el = document.getElementById('zoomLevel');
  if (el) el.textContent = Math.round(viewState.sc * 100) + '%';
}

// ============ 绘制网络图 ============
function drawGraph(V, edges, flowMatrix, reachable, s, t) {
  let canvas = document.getElementById('graphCanvas');
  let parent = canvas.parentElement;
  let W = parent.clientWidth - 0;
  let H = 360;
  canvas.width = W;
  canvas.height = H;

  // 保存数据 & 重置视图（清除缓存的布局）
  graphCache = { V, edges, flowMatrix, reachable, s, t };
  delete graphCache._layoutNodes;
  resetView();
  // 如果未绑定事件，初始化
  if (!canvas._eventsSetup) {
    setupCanvasEvents();
    canvas._eventsSetup = true;
  }
}

function renderGraph() {
  let { V, edges, flowMatrix, reachable, s, t } = graphCache;
  if (!V || V === 0) return;

  let canvas = document.getElementById('graphCanvas');
  let ctx = canvas.getContext('2d');
  let W = canvas.width, H = canvas.height;
  let { ox, oy, sc } = viewState;

  ctx.clearRect(0, 0, W, H);
  ctx.save();
  ctx.setTransform(sc, 0, 0, sc, ox, oy);

  // 节点位置 — 大图用力导向布局，小图用圆形布局
  // 只在新图时重新计算，缩放拖拽复用缓存
  let nodeR = 16, fontSize = 13, labelFont = 11, arrowS = 8;
  let nodes = graphCache._layoutNodes;
  if (!nodes) {
    if (V > 14) {
      nodes = forceDirectedLayout(V, edges, W, H, nodeR);
    } else {
      let cx = W / 2, cy = H / 2;
      let radius = Math.min(W, H) * 0.35;
      nodes = [];
      for (let i = 0; i < V; i++) {
        let angle = (i / V) * 2 * Math.PI - Math.PI / 2;
        nodes.push({ x: cx + radius * Math.cos(angle), y: cy + radius * Math.sin(angle), label: String(i) });
      }
    }
    graphCache._layoutNodes = nodes;
  }

  // 标签显示：小型图始终全标；大图只标有流量的边，但放大到>70%时全标
  let showEdgeLabel = V <= 18 || sc > 0.7;

  // 绘制边
  for (let e of edges) {
    let [u, v, cap] = e;
    let f = flowMatrix && flowMatrix[u] ? (flowMatrix[u][v] || 0) : 0;
    let isFull = f >= cap && cap > 0;
    let isCut = reachable && reachable[u] === true && reachable[v] === false;

    ctx.beginPath();
    let x1 = nodes[u].x, y1 = nodes[u].y;
    let x2 = nodes[v].x, y2 = nodes[v].y;
    let dx = x2 - x1, dy = y2 - y1;
    let dist = Math.sqrt(dx*dx + dy*dy) || 1;
    let nx = dx/dist, ny = dy/dist;
    let off = 12;
    let ox2 = -ny * off/5, oy2 = nx * off/5;

    ctx.moveTo(x1 + nx*nodeR + ox2, y1 + ny*nodeR + oy2);
    ctx.lineTo(x2 - nx*nodeR + ox2, y2 - ny*nodeR + oy2);

    let color = isCut ? '#ea4335' : (isFull ? '#ff6d01' : '#4285f4');
    ctx.strokeStyle = color;
    ctx.lineWidth = Math.max(2, Math.min(6, cap / 3));
    ctx.globalAlpha = (showEdgeLabel || f > 0) ? 1 : 0.4;
    ctx.stroke();
    ctx.globalAlpha = 1;

    // 箭头
    let angle = Math.atan2(y2 - y1, x2 - x1);
    let ax = x2 - nx*nodeR + ox2, ay = y2 - ny*nodeR + oy2;
    ctx.beginPath();
    ctx.moveTo(ax, ay);
    ctx.lineTo(ax - arrowS * Math.cos(angle - 0.4), ay - arrowS * Math.sin(angle - 0.4));
    ctx.lineTo(ax - arrowS * Math.cos(angle + 0.4), ay - arrowS * Math.sin(angle + 0.4));
    ctx.closePath();
    ctx.fillStyle = color;
    ctx.fill();

    // 容量/流量 标签
    let hasFlow = flowMatrix != null;
    if (showEdgeLabel || !hasFlow || f > 0) {
      let midX = (x1 + x2) / 2 + ox2 * 3;
      let midY = (y1 + y2) / 2 + oy2 * 3;
      ctx.font = labelFont + 'px Consolas, sans-serif';
      ctx.fillStyle = isCut ? '#ea4335' : '#555';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'bottom';
      ctx.fillText(f + '/' + cap, midX, midY - 2);
    }
  }

  // 绘制节点
  for (let i = 0; i < V; i++) {
    let n = nodes[i];
    ctx.beginPath();
    ctx.arc(n.x, n.y, nodeR, 0, Math.PI * 2);
    let color = i === s ? '#34a853' : (i === t ? '#ea4335' : '#4285f4');
    ctx.fillStyle = color;
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 3;
    ctx.stroke();

    ctx.font = 'bold ' + fontSize + 'px sans-serif';
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(n.label, n.x, n.y);
  }

  ctx.restore();
}

// ============ 计算结果格式化 ============
function formatResult(result, input) {
  let s = '';
  s += '========================================\n';
  s += '  最大流量: ' + result.maxFlow + '\n';
  s += '========================================\n\n';
  s += '  流量分配方案:\n';
  for (let e of input.edges) {
    let [u, v, cap] = e;
    let f = result.flowMatrix[u][v] || 0;
    let pct = cap > 0 ? (f / cap * 100).toFixed(1) : '—';
    let status = f >= cap && cap > 0 ? ' ⚠ 瓶颈' : '';
    s += '  ' + padDisp(u + ' → ' + v, 6) + ' ' + padDisp(f + '/' + cap, 10) + '  ' + padDisp(pct, 6) + '%' + status + '\n';
  }

  s += '\n  瓶颈路段（最小割）:\n';
  let found = false;
  for (let i = 0; i < input.V; i++) {
    if (result.reachable[i]) {
      for (let e of input.edges) {
        let [u, v] = e;
        if (u === i && !result.reachable[v]) {
          s += '    瓶颈: ' + i + ' → ' + v + '（已满负荷）\n';
          found = true;
        }
      }
    }
  }
  if (!found) s += '    （无瓶颈路段 — 网络流量未饱和）\n';

  return s;
}

// ============ 手动动态模拟 ============
function manualDynamic() {
  let input = parseInput('manual');
  if (!input) return;
  if (input.numPeriods < 2) {
    writeLog('需在道路列表中添加多个容量值才能运行动态模拟。\n格式：每行 "起点 终点 容量1 容量2 ..."\n如: 0 1 10 15 表示高峰期10、低峰期15');
    return;
  }
  let names = document.getElementById('periodNames').value.trim().split(/[,，\s]+/).filter(Boolean);
  while (names.length < input.numPeriods) names.push('时段' + (names.length + 1));
  // allCaps 是 edges×periods → 转置为 periods×edges
  let periodCaps = [];
  for (let pi = 0; pi < input.numPeriods; pi++) {
    periodCaps[pi] = input.allCaps.map(c => c[pi] != null ? c[pi] : c[0]);
  }
  runDynamicReport(input.V, input.E, input.s, input.t, periodCaps, input.edges.map(e => [e[0], e[1]]), names, '手动数据');
}

// ============ 预设动态模拟 ============
function runDynamicSim() {
  let val = document.getElementById('presetSelect').value;
  let dp = DYNAMIC_PRESETS[val];
  if (!dp) {
    // 尝试手动
    manualDynamic();
    return;
  }

  let n = dp.periodNames.length;
  runDynamicReport(dp.V, dp.E, dp.s, dp.t, dp.capacities, dp.edges, dp.periodNames, dp.name);
}

// ============ 动态报告生成（通用） ============
function runDynamicReport(V, E, s, t, allCaps, edgePairs, periodNames, name) {
  let n = periodNames.length;
  let sOut = '';
  sOut += '========================================\n';
  sOut += '  动态流量模拟 — ' + name + '\n';
  sOut += '  网络: ' + V + ' 节点, ' + E + ' 条道路\n';
  sOut += '  时段数: ' + n + ' (' + periodNames.join(', ') + ')\n';
  sOut += '========================================\n\n';

  let results = [];
  let maxAcross = 0;
  for (let pi = 0; pi < n; pi++) {
    let capList = allCaps[pi];
    let edges = edgePairs.map((e, i) => [e[0], e[1], capList[i]]);
    let res = edmondsKarp(V, edges, s, t);
    results.push(res);
    if (res.maxFlow > maxAcross) maxAcross = res.maxFlow;
  }

  // 对比表格
  let col1 = 12, col2 = 14;
  sOut += '  +-----------+---------------+---------------+' + '\n';
  sOut += '  | ' + padDisp('时段', col1) + ' | ' + padDisp('最大流量', col2) + ' | ' + padDisp('相对比值', col2) + ' |' + '\n';
  sOut += '  +-----------+---------------+---------------+' + '\n';
  for (let pi = 0; pi < n; pi++) {
    let ratio = maxAcross > 0 ? (results[pi].maxFlow / maxAcross * 100).toFixed(1) + '%' : '0%';
    sOut += '  | ' + padDisp(periodNames[pi], col1) + ' | ' + padDisp(String(results[pi].maxFlow), col2) + ' | ' + padDisp(ratio, col2) + ' |' + '\n';
  }
  sOut += '  +-----------+---------------+---------------+' + '\n';

  // 时段详情
  for (let pi = 0; pi < n; pi++) {
    sOut += '\n  * ' + periodNames[pi] + '\n';
    sOut += '  最大流量: ' + results[pi].maxFlow + '\n';
    sOut += '  流量分配:\n';
    for (let i = 0; i < edgePairs.length; i++) {
      let [u, v] = edgePairs[i];
      let f = results[pi].flowMatrix[u][v] || 0;
      let cap = allCaps[pi][i];
      sOut += '    ' + u + ' → ' + v + '  ' + f + '/' + cap + '\n';
    }
  }

  // 对比分析
  let maxIdx = 0, minIdx = 0;
  for (let i = 1; i < n; i++) {
    if (results[i].maxFlow > results[maxIdx].maxFlow) maxIdx = i;
    if (results[i].maxFlow < results[minIdx].maxFlow) minIdx = i;
  }
  let diff = results[maxIdx].maxFlow - results[minIdx].maxFlow;
  let diffPct = maxAcross > 0 ? (diff / maxAcross * 100).toFixed(1) : '0.0';

  sOut += '\n  ' + periodNames[maxIdx] + '通行能力最强: ' + results[maxIdx].maxFlow + ' 辆/小时\n';
  sOut += '  ' + periodNames[minIdx] + '通行能力最弱: ' + results[minIdx].maxFlow + ' 辆/小时\n';
  sOut += '  峰谷差: ' + diff + ' ( ' + diffPct + '% )\n\n';
  sOut += '  优化策略建议:\n';
  if (diff > 0) {
    sOut += '  * 考虑潮汐车道：在' + periodNames[minIdx] + '将部分车道改为出城方向\n';
    sOut += '  * 错峰出行引导：将部分交通流引导至' + periodNames[maxIdx] + '时段\n';
  }
  sOut += '  * 持续监控瓶颈路段，动态调整信号灯配时\n';

  writeLog(sOut);
  // 使用最后一个时段绘制
  let lastResult = results[n-1];
  let lastCap = allCaps[n-1];
  let lastEdges = edgePairs.map((e, i) => [e[0], e[1], lastCap[i]]);
  drawGraph(V, lastEdges, lastResult.flowMatrix, lastResult.reachable, s, t);
}

function padDisp(s, w) {
  let d = dispWidth(s), p = w - d;
  return s + ' '.repeat(Math.max(0, p));
}

function dispWidth(s) {
  let w = 0;
  for (let c of s) {
    w += c.charCodeAt(0) > 127 ? 2 : 1;
  }
  return w;
}

// ============ 确认输入 ============
function confirmInput() {
  let input = parseInput('manual');
  if (!input) return;
  // 更新只读参数显示
  document.getElementById('vertices').value = input.V;
  document.getElementById('edges').value = input.E;
  document.getElementById('source').value = input.s;
  document.getElementById('sink').value = input.t;
  let hint = '✓ 已识别: ' + input.V + ' 节点, ' + input.E + ' 条边';
  if (input.numPeriods > 1) {
    hint += '\n📊 检测到多时段数据（' + input.numPeriods + '个时段），请点击「动态模拟」运行对比';
  } else {
    hint += '\n▶ 请点击「计算最大流」运行算法';
  }
  writeLog(hint);
}

// ============ 计算主入口 ============
function computeMaxFlow() {
  let input = parseInput('manual');
  if (!input) return;

  let result = edmondsKarp(input.V, input.edges, input.s, input.t);

  writeLog(formatResult(result, input));
  drawGraph(input.V, input.edges, result.flowMatrix, result.reachable, input.s, input.t);
}

function writeLog(msg) {
  let el = document.getElementById('output');
  el.textContent = msg;
  el.scrollTop = 0;
}

function clearOutput() {
  document.getElementById('output').textContent = '就绪 —— 点击"计算最大流"开始...';
  let canvas = document.getElementById('graphCanvas');
  let ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}

// ============ 初始化 ============
window.addEventListener('load', () => {
  computeMaxFlow();
  window.addEventListener('resize', () => {
    if (graphCache.V > 0) {
      let res = edmondsKarp(graphCache.V, graphCache.edges, graphCache.s, graphCache.t);
      drawGraph(graphCache.V, graphCache.edges, res.flowMatrix, res.reachable, graphCache.s, graphCache.t);
    }
  });
});
